databases:
  - name: ignara-postgres
    databaseName: dreampath
    user: dreampath_user
    plan: free

services:
  - type: web
    name: ignara-api
    runtime: node
    rootDir: backend
    plan: free
    buildCommand: npm install
    startCommand: npm run migrate && npm run start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      # PORT is set automatically by Render — do not override (proxy + health checks expect it).
      - key: DATABASE_URL
        fromDatabase:
          name: ignara-postgres
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: CLIENT_URL
        value: https://frontend-five-livid-15.vercel.app,https://frontend-pethkgnf2-prayushaparikh2020-9565s-projects.vercel.app
