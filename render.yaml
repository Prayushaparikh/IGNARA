databases:
  - name: ignara-postgres
    databaseName: dreampath
    user: dreampath_user
    plan: free

services:
  - type: web
    name: ignara-api
    runtime: node
    rootDir: backend
    plan: free
    buildCommand: npm install
    # Migrations can take 1–2+ minutes (large SQL). If they run in startCommand, the server
    # isn’t listening yet and Render’s /health check times out → “deploy failed”.
    preDeployCommand: npm run migrate
    startCommand: npm run start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      # PORT is set automatically by Render — do not override (proxy + health checks expect it).
      - key: DATABASE_URL
        fromDatabase:
          name: ignara-postgres
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: CLIENT_URL
        # Full origins with https:// (browser Origin header must match exactly). Add/remove Vercel URLs as needed.
        value: https://frontend-five-livid-15.vercel.app,https://frontend-bhm7tbqtz-prayushaparikh2020-9565s-projects.vercel.app
