databases:
  - name: ignara-postgres
    databaseName: dreampath
    user: dreampath_user
    plan: free

services:
  - type: web
    name: ignara-api
    runtime: node
    rootDir: backend
    plan: free
    buildCommand: npm install
    # Migrations can take 1–2+ minutes (large SQL). If they run in startCommand, the server
    # isn’t listening yet and Render’s /health check times out → “deploy failed”.
    preDeployCommand: npm run migrate
    startCommand: npm run start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      # PORT is set automatically by Render — do not override (proxy + health checks expect it).
      - key: DATABASE_URL
        fromDatabase:
          name: ignara-postgres
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      # Quote the URL list so `https://` does not confuse YAML parsers (can break Blueprint sync).
      - key: CLIENT_URL
        value: "https://ignara.vercel.app,https://ignaracodex.com,https://www.ignaracodex.com"
