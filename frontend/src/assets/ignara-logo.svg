<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 80" width="280" height="80">
  <!-- Spark mark -->
  <g transform="translate(36, 40)">
    <!-- Outer glow -->
    <circle cx="0" cy="0" r="28" fill="#F59E0B" opacity="0.06"/>
    <!-- Outer diamond -->
    <polygon points="0,-26 15,-5 0,13 -15,-5" fill="#F59E0B" opacity="0.12"/>
    <!-- Diamond outline -->
    <polygon points="0,-26 13,-4 0,13 -13,-4" fill="none" stroke="#F59E0B" stroke-width="1.2" opacity="0.7"/>
    <!-- Inner flame -->
    <polygon points="0,-18 8,-3 0,8 -8,-3" fill="#EF6820" opacity="0.35"/>
    <!-- Center ember -->
    <circle cx="0" cy="-2" r="5.5" fill="#F59E0B"/>
    <circle cx="0" cy="-2" r="3"   fill="#FCD34D"/>
    <!-- Spark particles -->
    <circle cx="-17" cy="-13" r="2"   fill="#F59E0B" opacity="0.75"/>
    <circle cx="18"  cy="-16" r="1.5" fill="#FCD34D" opacity="0.65"/>
    <circle cx="13"  cy="10"  r="1.5" fill="#F59E0B" opacity="0.55"/>
    <circle cx="-14" cy="8"   r="1.8" fill="#EF6820" opacity="0.6"/>
    <circle cx="-24" cy="-2"  r="1.2" fill="#FCD34D" opacity="0.4"/>
    <circle cx="24"  cy="-2"  r="1.2" fill="#F59E0B" opacity="0.4"/>
    <circle cx="4"   cy="-31" r="1.5" fill="#FCD34D" opacity="0.5"/>
    <!-- Tiny sparkle cross -->
    <line x1="0" y1="-9"  x2="0" y2="-5"  stroke="#FCD34D" stroke-width="0.9" opacity="0.8"/>
    <line x1="-2" y1="-7" x2="2" y2="-7"  stroke="#FCD34D" stroke-width="0.9" opacity="0.8"/>
  </g>

  <!-- Wordmark -->
  <text x="72" y="44"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="36" font-weight="700"
    letter-spacing="-1px"
    fill="#FFF8F0">Ignara</text>

  <!-- Tagline -->
  <text x="72" y="62"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="12" font-weight="300"
    font-style="italic"
    letter-spacing="0.3px"
    fill="#A89F91">Ignite the fire within</text>
</svg>
